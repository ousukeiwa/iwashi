<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>将棋盤</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#d8b36a;
    font-family:serif;
}

#board{
    display:grid;
    grid-template-columns:repeat(9,60px);
    grid-template-rows:repeat(9,60px);
    border:4px solid #333;
}

.cell{
    width:60px;
    height:60px;
    border:1px solid #333;
    background:#f3d28a;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:32px;
    cursor:pointer;
    user-select:none;
}

.gote{
    transform:rotate(180deg);
    display:inline-block;
}
</style>
</head>

<body>

<div id="board"></div>

<script>

const board=document.getElementById("board");

const pieces=[
[
{p:"香",g:true},
{p:"桂",g:true},
{p:"銀",g:true},
{p:"金",g:true},
{p:"王",g:true},
{p:"金",g:true},
{p:"銀",g:true},
{p:"桂",g:true},
{p:"香",g:true}
],
[
{p:"",g:false},
{p:"飛",g:true},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"角",g:true},
{p:"",g:false}
],
Array(9).fill().map(()=>({p:"歩",g:true})),
Array(9).fill().map(()=>({p:"",g:false})),
Array(9).fill().map(()=>({p:"",g:false})),
Array(9).fill().map(()=>({p:"",g:false})),
Array(9).fill().map(()=>({p:"歩",g:false})),
[
{p:"",g:false},
{p:"角",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"",g:false},
{p:"飛",g:false},
{p:"",g:false}
],
[
{p:"香",g:false},
{p:"桂",g:false},
{p:"銀",g:false},
{p:"金",g:false},
{p:"王",g:false},
{p:"金",g:false},
{p:"銀",g:false},
{p:"桂",g:false},
{p:"香",g:false}
]
];

let selected=null;

function draw(){

board.innerHTML="";

for(let y=0;y<9;y++){

for(let x=0;x<9;x++){

const cell=document.createElement("div");
cell.className="cell";

const piece=pieces[y][x];

if(piece.p!=""){

if(piece.g){

cell.innerHTML="<span class='gote'>"+piece.p+"</span>";

}else{

cell.textContent=piece.p;

}

}

cell.onclick=()=>clickCell(x,y);

board.appendChild(cell);

}

}

}

function clickCell(x,y){

if(selected==null){

if(pieces[y][x].p!=""){

selected={x,y};

}

}else{

pieces[y][x]=pieces[selected.y][selected.x];
pieces[selected.y][selected.x]={p:"",g:false};

selected=null;

draw();

}

}

draw();

</script>

</body>
</html>
